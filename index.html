    <style>
      @import url("https://fonts.googleapis.com/css?family=Bricolage+Grotesque:400|DM+Sans:500,700,400|Instrument+Sans:500");

    <style>
      @import url("https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css");
      * {
        -webkit-font-smoothing: antialiased;
        box-sizing: border-box;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      /* Prevenir overflow horizontal em todos os elementos */
      * {
        max-width: 100%;
      }

      /* Garantir que elementos absolutos não saiam da tela em mobile */
      @media (max-width: 768px) {
        [style*="position: absolute"],
        [class*="absolute"] {
          max-width: 100vw;
        }
      }
      html,
      body {
        margin: 0px;
        height: 100%;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      /* a blue color as a generic focus style */
      button:focus-visible {
        outline: 2px solid #4a90e2 !important;
        outline: -webkit-focus-ring-color auto 5px !important;
      }
      a {
        text-decoration: none;
      }
    </style>
    <link href="styleguide.css" rel="stylesheet" />
